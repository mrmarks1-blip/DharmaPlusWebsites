<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ngöndro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6b0f1a">
<link rel="manifest" href="manifest.json">
<title>ESM Ngöndro v8</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   THEMES
═══════════════════════════════════════════ */
:root {
  --bg:#fdf8f0; --surf:#f0e8d8; --card:#fff; --card2:#f5ede0;
  --bdr:rgba(107,15,26,.15); --bdr-hi:rgba(107,15,26,.4);
  --gold:#7a4e00; --gold-hi:#a06800; --gold-lo:rgba(122,78,0,.45); --gold-ghost:rgba(122,78,0,.07);
  --red:#6b0f1a; --red-hi:#8b2020; --red-lo:rgba(107,15,26,.07);
  --tx:#1a0804; --tx-mid:#5a3820; --tx-lo:#8a6850; --tx-ghost:#c0a890;
  --nav-bg:linear-gradient(180deg,#fff,#f5ede0); --nav-bdr:rgba(107,15,26,.12);
  --modal:rgba(0,0,0,.55); --inp:rgba(0,0,0,.04);
  --nav-h:62px; --safe-b:env(safe-area-inset-bottom,0px);
  --scale:1;
  --scroll-bg:rgba(248,240,224,.95);
}
[data-theme="dark"] {
  --bg:#0e0804; --surf:#180e06; --card:#221408; --card2:#2c1a0a;
  --bdr:rgba(210,155,40,.18); --bdr-hi:rgba(210,155,40,.45);
  --gold:#d4980a; --gold-hi:#f0b830; --gold-lo:rgba(212,152,10,.45); --gold-ghost:rgba(212,152,10,.07);
  --red:#8a3820; --red-hi:#c05030; --red-lo:rgba(138,56,32,.12);
  --tx:#f0e4c8; --tx-mid:#b09060; --tx-lo:#705838; --tx-ghost:#3a2814;
  --nav-bg:linear-gradient(180deg,#1a1006,#0e0804); --nav-bdr:rgba(210,155,40,.12);
  --modal:rgba(0,0,0,.82); --inp:rgba(255,255,255,.04);
  --scroll-bg:rgba(0,0,0,.84);
}
[data-theme="neuro"] {
  --bg:#08101c; --surf:#101828; --card:#182030; --card2:#1e2838;
  --bdr:rgba(80,140,200,.2); --bdr-hi:rgba(80,140,200,.5);
  --gold:#5898c8; --gold-hi:#78b8e8; --gold-lo:rgba(88,152,200,.5); --gold-ghost:rgba(88,152,200,.07);
  --red:#2a5878; --red-hi:#3878b0; --red-lo:rgba(42,88,120,.1);
  --tx:#e0eaf8; --tx-mid:#80a0c0; --tx-lo:#406080; --tx-ghost:#182840;
  --nav-bg:linear-gradient(180deg,#101828,#08101c); --nav-bdr:rgba(80,140,200,.12);
  --modal:rgba(0,0,0,.85); --inp:rgba(255,255,255,.05);
  --scroll-bg:rgba(0,0,0,.84);
}
[data-theme="temple"] {
  --bg:#1a0608; --surf:#220a0c; --card:#2c0e10; --card2:#340f12;
  --bdr:rgba(200,120,20,.2); --bdr-hi:rgba(200,120,20,.5);
  --gold:#e09020; --gold-hi:#f0b030; --gold-lo:rgba(220,140,20,.5); --gold-ghost:rgba(220,140,20,.08);
  --red:#d0560a; --red-hi:#e87020; --red-lo:rgba(200,80,10,.1);
  --tx:#f5e8d0; --tx-mid:#c09060; --tx-lo:#705030; --tx-ghost:#3a1a10;
  --nav-bg:linear-gradient(180deg,#2c0e10,#1a0608); --nav-bdr:rgba(200,120,20,.15);
  --modal:rgba(0,0,0,.85); --inp:rgba(255,255,255,.05);
  --scroll-bg:rgba(0,0,0,.84);
}
[data-theme="night"] {
  --bg:#080c1e; --surf:#0e1430; --card:#141c3a; --card2:#1a2244;
  --bdr:rgba(160,130,200,.2); --bdr-hi:rgba(160,130,200,.5);
  --gold:#c0a060; --gold-hi:#d8bc80; --gold-lo:rgba(190,160,80,.5); --gold-ghost:rgba(190,160,80,.07);
  --red:#8050b8; --red-hi:#a070d8; --red-lo:rgba(120,70,180,.1);
  --tx:#f0e8ff; --tx-mid:#9080c0; --tx-lo:#504080; --tx-ghost:#201830;
  --nav-bg:linear-gradient(180deg,#141c3a,#080c1e); --nav-bdr:rgba(160,130,200,.12);
  --modal:rgba(0,0,0,.88); --inp:rgba(255,255,255,.05);
  --scroll-bg:rgba(0,0,0,.84);
}
[data-theme="earth"] {
  --bg:#f5ede0; --surf:#ede0ce; --card:#fff8f0; --card2:#f8eed8;
  --bdr:rgba(160,80,20,.15); --bdr-hi:rgba(160,80,20,.4);
  --gold:#a06820; --gold-hi:#c08830; --gold-lo:rgba(160,100,20,.45); --gold-ghost:rgba(160,100,20,.07);
  --red:#b8490a; --red-hi:#d05818; --red-lo:rgba(180,70,10,.07);
  --tx:#2c1008; --tx-mid:#6a3818; --tx-lo:#9a6040; --tx-ghost:#d0b090;
  --nav-bg:linear-gradient(180deg,#fff8f0,#ede0ce); --nav-bdr:rgba(160,80,20,.12);
  --modal:rgba(0,0,0,.55); --inp:rgba(0,0,0,.04);
  --scroll-bg:rgba(245,237,224,.97);
}
[data-theme="slate"] {
  --bg:#1c2330; --surf:#222c3c; --card:#283444; --card2:#2e3c4e;
  --bdr:rgba(140,170,200,.2); --bdr-hi:rgba(140,170,200,.45);
  --gold:#7090b0; --gold-hi:#90b0d0; --gold-lo:rgba(110,150,190,.5); --gold-ghost:rgba(110,150,190,.07);
  --red:#506080; --red-hi:#6080a0; --red-lo:rgba(70,90,120,.1);
  --tx:#d8e8f8; --tx-mid:#8090a8; --tx-lo:#506070; --tx-ghost:#283040;
  --nav-bg:linear-gradient(180deg,#283444,#1c2330); --nav-bdr:rgba(140,170,200,.12);
  --modal:rgba(0,0,0,.8); --inp:rgba(255,255,255,.04);
  --scroll-bg:rgba(0,0,0,.84);
}

/* ═══════════════════════════════════════════
   RESET & BASE — scale cascades from body
═══════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); }
body { font-family:'Lato',sans-serif; color:var(--tx); font-size:calc(14px * var(--scale)); }
a { color:inherit; }
::-webkit-scrollbar { width:2px; } ::-webkit-scrollbar-thumb { background:var(--gold-lo); border-radius:1px; }

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
#app { position:fixed; inset:0; display:flex; flex-direction:column; }
#content { flex:1; overflow:hidden; position:relative; }
#nav {
  flex-shrink:0; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b);
  background:var(--nav-bg); border-top:1px solid var(--nav-bdr);
  display:flex; position:relative; z-index:100;
}
.nb {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; background:none; border:none; cursor:pointer; padding:5px 1px;
  color:var(--tx-ghost); transition:color .2s; font-family:'Lato';
}
.nb.active { color:var(--gold); }
.nb-ico { font-size:calc(17px * var(--scale)); line-height:1; }
.nb-lbl { font-size:calc(8.5px * var(--scale)); letter-spacing:.5px; text-transform:uppercase; }

/* ═══════════════════════════════════════════
   PRACTICE BACKGROUNDS (behind image)
═══════════════════════════════════════════ */
.pr-bg-0 { background:#0e1e3a; }
.pr-bg-1 { background:#3c1406; }
.pr-bg-2 { background:#160636; }
.pr-bg-3 { background:#082212; }
.pr-bg-4 { background:#261602; }
.pr-bg-5 { background:#060c30; }
.pr-bg-6 { background:#280414; }

/* ═══════════════════════════════════════════
   PRACTICE SCROLL SECTION
═══════════════════════════════════════════ */
.pr-scroll-section {
  flex:1; overflow-y:auto; background:var(--scroll-bg);
}
/* Text colour overrides inside scroll for light/earth themes */
:root .pr-scroll-section, [data-theme="earth"] .pr-scroll-section {
  --pr-tx: var(--tx);
  --pr-tx-mid: var(--tx-mid);
  --pr-tx-lo: var(--tx-lo);
}

/* ═══════════════════════════════════════════
   MODALS / SHEETS / DIALOGS
═══════════════════════════════════════════ */
.veil { position:fixed; inset:0; background:var(--modal); z-index:200; display:flex; align-items:flex-end; }
.veil.center { align-items:center; justify-content:center; padding:18px; }
.sheet {
  background:var(--card); border-top:1px solid var(--bdr); border-radius:22px 22px 0 0;
  width:100%; max-height:90vh; overflow-y:auto; padding:6px 18px calc(24px + var(--safe-b));
  animation:slideUp .28s cubic-bezier(.32,.72,0,1);
}
.dialog {
  background:var(--card); border:1px solid var(--bdr); border-radius:20px;
  padding:22px 18px; width:100%; max-width:360px;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
}
/* Refuge drawer */
.rf-drawer {
  position:fixed; bottom:0; left:0; right:0; z-index:210;
  background:var(--card); border-top:1px solid var(--bdr); border-radius:22px 22px 0 0;
  max-height:72vh; display:flex; flex-direction:column;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom:var(--safe-b);
}
.rf-drawer.open { transform:translateY(0); }
.rf-drawer-scroll { flex:1; overflow-y:auto; padding:0 18px calc(16px + var(--safe-b)); }
.rf-veil {
  position:fixed; inset:0; z-index:209;
  background:rgba(0,0,0,0); pointer-events:none;
  transition:background .3s;
}
.rf-veil.open { background:var(--modal); pointer-events:auto; }

@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes rise { 0%{opacity:1;transform:translateY(0) translateX(-50%)} 100%{opacity:0;transform:translateY(-60px) translateX(-50%)} }
@keyframes ripple { 0%{transform:scale(.2) translate(-50%,-50%);opacity:.5} 100%{transform:scale(9) translate(-50%,-50%);opacity:0} }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(212,152,10,.4)} 50%{box-shadow:0 0 0 5px rgba(212,152,10,0)} }

.handle { width:36px; height:4px; border-radius:2px; background:rgba(128,100,60,.2); margin:10px auto 16px; }
.stitle { font-family:'Playfair Display'; font-size:calc(13px * var(--scale)); letter-spacing:1.5px; color:var(--gold); text-align:center; margin-bottom:18px; }

/* ═══════════════════════════════════════════
   INPUTS & BUTTONS
═══════════════════════════════════════════ */
input[type=number],input[type=date],input[type=text] {
  background:var(--inp); border:1px solid var(--bdr); border-radius:10px;
  padding:12px 14px; width:100%; color:var(--tx);
  font-size:calc(16px * var(--scale)); font-family:'Lato'; outline:none;
  -webkit-appearance:none; appearance:none;
}
input:focus { border-color:var(--gold-lo); }
input::placeholder { color:var(--tx-ghost); }
.btn {
  background:linear-gradient(135deg,#c8900a,#7a5808); color:#f8f0d8; border:none;
  border-radius:11px; padding:calc(14px * var(--scale)) 18px;
  font-family:'Playfair Display'; font-size:calc(12px * var(--scale)); letter-spacing:1px;
  cursor:pointer; width:100%; transition:opacity .15s;
  box-shadow:0 2px 12px rgba(200,140,10,.2);
}
.btn:active { opacity:.8; }
[data-theme="dark"] .btn { background:linear-gradient(135deg,#c8900a,#7a5808); }
[data-theme="neuro"] .btn { background:linear-gradient(135deg,#2860a0,#14305a); color:#e0f0ff; }
.btn-o {
  background:transparent; color:var(--tx-mid); border:1px solid var(--bdr);
  border-radius:11px; padding:calc(13px * var(--scale)) 18px;
  font-family:'Lato'; font-size:calc(13px * var(--scale)); cursor:pointer; width:100%;
  transition:color .2s;
}
.btn-o:active { color:var(--gold); }
.brow { display:flex; gap:10px; } .brow>* { flex:1; }
hr.rule { border:none; border-top:1px solid var(--bdr); margin:14px 0; }

/* ═══════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════ */
.tib-s { font-size:calc(15px * var(--scale)); color:var(--red-hi); opacity:.85; line-height:1.9; }
.tib-p { font-family:'Playfair Display'; font-weight:700; font-size:calc(12px * var(--scale)); letter-spacing:1px; color:var(--gold-hi); line-height:2; }
.tib-e { font-family:'Cormorant Garamond'; font-style:italic; font-size:calc(16px * var(--scale)); color:var(--tx-mid); line-height:1.75; }

/* ═══════════════════════════════════════════
   CHIP BUTTONS (used in filters, settings, etc.)
═══════════════════════════════════════════ */
.a11y-b {
  background:var(--card); border:1px solid var(--bdr); border-radius:20px;
  padding:6px 11px; font-size:calc(11px * var(--scale)); color:var(--tx-lo);
  cursor:pointer; font-family:'Lato'; white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.a11y-b.on { color:var(--gold); border-color:var(--gold-lo); }

/* ═══════════════════════════════════════════
   REFUGE TREE — numbered markers (zone-coloured, high contrast)
═══════════════════════════════════════════ */
.rf-marker {
  position:absolute; transform:translate(-50%,-50%);
  width:24px; height:24px; border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  display:flex; align-items:center; justify-content:center;
  font-size:9px; font-family:'Lato'; font-weight:700; color:#fff;
  cursor:pointer; z-index:10; transition:all .2s;
  box-shadow:0 2px 6px rgba(0,0,0,.65), 0 0 0 1px rgba(0,0,0,.3);
  text-shadow:0 1px 3px rgba(0,0,0,.6);
}
.rf-marker:hover, .rf-marker:active { transform:translate(-50%,-50%) scale(1.35); box-shadow:0 3px 12px rgba(0,0,0,.8), 0 0 0 1px rgba(0,0,0,.3); }
.rf-marker.hidden-marker { display:none; }
.rf-marker.dim { opacity:.25; }
.rf-marker.highlighted { box-shadow:0 0 12px rgba(255,255,255,.6), 0 3px 10px rgba(0,0,0,.7); border-color:#fff; transform:translate(-50%,-50%) scale(1.15); }

.rf-legend-item {
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border-bottom:1px solid var(--bdr); cursor:pointer; transition:background .15s;
}
.rf-legend-item:active { background:var(--gold-ghost); }
.rf-legend-item.dim { opacity:.3; }
.rf-legend-num {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  background:var(--gold-ghost); border:1px solid var(--bdr-hi);
  display:flex; align-items:center; justify-content:center;
  font-size:calc(10px * var(--scale)); font-family:'Lato'; font-weight:700; color:var(--gold);
}

/* ═══════════════════════════════════════════
   DESKTOP — sidebar nav + wider layout
═══════════════════════════════════════════ */
@media (min-width: 768px) {
  /* Sidebar nav */
  #app { flex-direction: row; }
  #nav {
    flex-direction: column; justify-content: flex-start; align-items: stretch;
    width: 170px; height: 100%;
    border-top: none; border-right: 1px solid var(--nav-bdr);
    flex-shrink: 0; padding-bottom: 0;
  }
  .nb {
    flex-direction: row; justify-content: flex-start;
    gap: 11px; padding: 15px 20px;
    flex: none; width: 100%; border-radius: 0;
    border-left: 3px solid transparent;
    transition: color .2s, background .2s, border-color .2s;
  }
  .nb.active { background: var(--gold-ghost); border-left-color: var(--gold); }
  .nb-ico { font-size: 18px; }
  .nb-lbl { font-size: 11px; letter-spacing: .4px; }

  /* Settings button: pinned to bottom of sidebar */
  .settings-nb { margin-top: auto; border-top: 1px solid var(--nav-bdr); }
  .settings-nb .nb-lbl { display: block !important; }

  /* Refuge drawer: offset so it doesn't overlap sidebar */
  .rf-drawer { left: 170px; }
  .rf-veil { left: 170px; }

  /* Sheets become centred dialogs instead of bottom-sliders */
  .veil { align-items: center; justify-content: center; padding: 24px; }
  .sheet {
    border-radius: 20px; border: 1px solid var(--bdr);
    max-width: 520px; width: 100%;
    animation: popIn .22s cubic-bezier(.34,1.56,.64,1);
  }

  /* Nicer scrollbar on desktop */
  ::-webkit-scrollbar { width: 5px; }

  /* Hide touch-only hints */
  .swipe-hint { display: none !important; }
}

/* Wide desktop — slightly wider sidebar */
@media (min-width: 1100px) {
  #nav { width: 200px; }
  .nb { padding: 16px 24px; }
  .rf-drawer { left: 200px; }
  .rf-veil { left: 200px; }
}

/* Settings nav icon — hide label on mobile (icon-only to save space) */
.settings-nb .nb-lbl { display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav"></nav>
  <!-- Refuge tree drawer (persists across filter changes) -->
  <div id="rf-veil" class="rf-veil" onclick="closeDrawer()"></div>
  <div id="rf-drawer" class="rf-drawer">
    <div class="handle" onclick="closeDrawer()" style="cursor:pointer;"></div>
    <div id="rf-drawer-scroll" class="rf-drawer-scroll"></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// THEME & SIZE (persisted, no floating panel)
// ═══════════════════════════════════════════════════════════
function ls(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  lsSet('esm_theme',t);
}
function setSize(s){
  document.documentElement.style.setProperty('--scale',s);
  lsSet('esm_size',s);
}
(function initA11y(){
  setTheme(ls('esm_theme','light'));
  setSize(ls('esm_size',1));
})();

// ═══════════════════════════════════════════════════════════
// PRACTICES DATA
// ═══════════════════════════════════════════════════════════
const PR=[
  {id:'refuge',   name:'Short Refuge',    sub:'Short refuge formulas',  target:11000,  cv:100,  bg:0, acc:'#5a9ece', img:'refuge-tree.jpg', imgFull:true},
  {id:'prostr',   name:'Prostrations',    sub:'Full body prostrations', target:111111, cv:1000, bg:1, acc:'#d07850', img:'prostr.jpg'},
  {id:'diamond',  name:'Diamond Mind',    sub:'Vajrasattva mantras',    target:111111, cv:1000, bg:2, acc:'#9070d8', img:'dm.jpg',         mantra:'OM VAJRASATTVA HUNG'},
  {id:'mandala',  name:'Mandala Offering',sub:'Mandala offerings',      target:111111, cv:1000, bg:3, acc:'#40a880', img:'mandala.jpg'},
  {id:'guruyoga', name:'Guru Yoga',       sub:'Guru Yoga mantras',      target:111111, cv:1000, bg:4, acc:'#c89040', img:'guru.jpg',        mantra:'KARMAPA KHENNO'},
  {id:'phowa',    name:'Phowa Prep.',     sub:'Om Ami Dewa Hrih',       target:500000, cv:5000, bg:5, acc:'#5878d8', img:'phowa.jpg',       mantra:'OM AMI DEWA HRIH'},
  {id:'loving',   name:'Loving Eyes',     sub:'Om Mani Peme Hung',      target:1000000,cv:10000,bg:6, acc:'#c85880', img:'lovingeyes.jpg',  mantra:'OM MANI PEME HUNG'},
];
const COLS=12;
const PACE_OPTS=[0,21,50,100,108,200,300,500,1000];

// ═══════════════════════════════════════════════════════════
// PRAYERS
// ═══════════════════════════════════════════════════════════
const PRAYERS=[
  {id:'refuge_bodhi',title:'Refuge & Bodhicitta',sub:'Opening practice — Refuge ×3, then Bodhicitta ×3',couplets:[
    {sec:'REFUGE — SKYAB \'GRO  (×3)'},
    {t:'སངས་རྒྱས་ཆོས་དང་ཚོགས་ཀྱི་མཆོག་རྣམས་ལ།',p:'SANG GYE CHO DANG TSOK KYI CHOK NAM LA',e:'Until enlightenment I take refuge,'},

   wiki:'https://en.wikipedia.org/wiki/Vajradhara'},
  {n:2,  id:'lodro-rinchen',   name:'Lodro Rinchen',     sub:'Indian lineage holder',                   x:49.8,y:9.6, tags:['mahasiddhas','lineage'],

  {n:3,  id:'saraha',          name:'Saraha',            sub:'Mahāsiddha — Dohā master',                tib:'ས་ར་ཧ།', x:42.6,y:9.8, tags:['mahasiddhas','lineage'],

   role:'Received the Four Special Transmissions directly from Vajradhara',

  {n:8,  id:'naropa',          name:'Nāropa',            sub:'Indian Mahāsiddha — Six Yogas',           tib:'ནཱ་རོ་པ།', x:68.9,y:5.7, tags:['mahasiddhas','lineage'],
   role:'Transmitted the Six Yogas of Nāropa to Tibet through Mārpa',
   bio:'A celebrated scholar at Nālandā, Nāropa left everything to find Tilopa. After twelve great ordeals he received the complete transmission. The Six Yogas — tummo, illusory body, dream yoga, clear light, phowa and bardo — remain central to Karma Kagyu practice today.',

  {n:10, id:'milarepa',        name:'Milarepa',          sub:'Greatest Yogi of Tibet',                  tib:'མི་ལ་རས་པ།', x:50,y:20.5, tags:['teachers','lineage'],

// LUNAR CALENDAR
// ═══════════════════════════════════════════════════════════
const SYN=29.530588853;
const REF_NM=new Date(2025,0,29,12,36,0);
function moonAge(d){const el=(d-REF_NM)/86400000;return((el%SYN)+SYN)%SYN;}
function tibDay(d){return Math.max(1,Math.min(30,Math.round(moonAge(d))+1));}
function moonPhase(age){
  if(age<1.5)return'New Moon';if(age<7.4)return'Waxing Crescent';
  if(age<10.4)return'First Quarter';if(age<13.5)return'Waxing Gibbous';
  if(age<16.5)return'Full Moon';if(age<19.5)return'Waning Gibbous';
  if(age<22.5)return'Last Quarter';return'Waning Crescent';}
function moonIllum(age){return(1-Math.cos((age/SYN)*2*Math.PI))/2;}
function moonSVG(age,sz){
  sz=sz||30;const il=moonIllum(age),wax=age<SYN/2,cx=sz/2,cy=sz/2,r=sz/2-1;
  const dark='#1a1828',lit='#f0e8c0';
  let inner='';
  if(il<0.02){inner=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}"/>`;}
  else if(il>0.98){inner=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${lit}"/>`;}
  else{
    const ecc=Math.abs(2*il-1),rx=r*ecc;
    if(wax){inner=`<path d="M${cx} ${cy-r}A${r} ${r} 0 0 1 ${cx} ${cy+r}A${rx} ${r} 0 0 ${il>0.5?0:1} ${cx} ${cy-r}Z" fill="${lit}"/>
      <path d="M${cx} ${cy-r}A${r} ${r} 0 0 0 ${cx} ${cy+r}A${rx} ${r} 0 0 ${il>0.5?0:1} ${cx} ${cy-r}Z" fill="${dark}"/>`;}
    else{inner=`<path d="M${cx} ${cy-r}A${r} ${r} 0 0 0 ${cx} ${cy+r}A${rx} ${r} 0 0 ${il>0.5?1:0} ${cx} ${cy-r}Z" fill="${lit}"/>
      <path d="M${cx} ${cy-r}A${r} ${r} 0 0 1 ${cx} ${cy+r}A${rx} ${r} 0 0 ${il>0.5?1:0} ${cx} ${cy-r}Z" fill="${dark}"/>`;}
  }
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${dark}"/>${inner}<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(240,220,160,0.2)" stroke-width="0.8"/></svg>`;}

function nextAusp(from,n){
  const out=[];let d=new Date(from);d.setHours(12,0,0,0);
  for(let i=0;i<90&&out.length<n;i++){
    d=new Date(d.getTime()+86400000);const td=tibDay(d);
    if(AUSP[td])out.push({date:new Date(d),td,a:AUSP[td]});}
  return out;}
function doy(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);}

function paceFromDate(c,ds,tgt){const rem=tgt-c;if(rem<=0)return 0;const days=Math.max(1,Math.round((new Date(ds)-new Date())/86400000));const p=Math.ceil(rem/days);return p+(p%100>0?100-(p%100):0);}
function bell(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();[[0,528,.32],[.15,396,.22],[.3,264,.18]].forEach(([dl,fr,g])=>{const o=ac.createOscillator(),gn=ac.createGain();o.connect(gn);gn.connect(ac.destination);o.type='sine';o.frequency.setValueAtTime(fr,ac.currentTime+dl);o.frequency.exponentialRampToValueAtTime(fr*.5,ac.currentTime+dl+3);gn.gain.setValueAtTime(0,ac.currentTime+dl);gn.gain.linearRampToValueAtTime(g,ac.currentTime+dl+.04);gn.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dl+5);o.start(ac.currentTime+dl);o.stop(ac.currentTime+dl+6);});}catch(e){}}

function h(tag,at,...kids){
  const el=document.createElement(tag);
  if(at)for(const[k,v]of Object.entries(at)){
    if(v==null)continue;
    if(k==='cls')el.className=v;
    else if(k==='sty')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);

function renderGrid(pr,counter){
  const{target,cv}=pr,total=Math.ceil(target/cv),rows=Math.ceil(total/COLS);
  const filled=Math.floor(counter/cv),partial=(counter%cv)/cv;
  const contentW=(document.getElementById('content')||{clientWidth:window.innerWidth}).clientWidth;
  const cS=Math.min(14,(contentW-24)/COLS),r=cS*.36;
  const acc='#9b1c2a'; // crimson for all practices
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${COLS*cS} ${rows*cS}`);
  svg.style.cssText='width:100%;display:block;';
  for(let i=0;i<total;i++){
    const cx=(i%COLS)*cS+cS/2,cy=Math.floor(i/COLS)*cS+cS/2;
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
    if(i<filled){c.setAttribute('fill',acc);c.setAttribute('opacity','0.88');}
    else if(i===filled&&partial>0.04){
      const cid=`p${pr.id}${i}`,defs=document.createElementNS(NS,'defs'),cp=document.createElementNS(NS,'clipPath');
      cp.setAttribute('id',cid);const rect=document.createElementNS(NS,'rect');
      rect.setAttribute('x',cx-r-1);rect.setAttribute('y',cy+r-partial*2*r-1);
      rect.setAttribute('width',r*2+2);rect.setAttribute('height',partial*2*r+2);
      cp.appendChild(rect);defs.appendChild(cp);svg.appendChild(defs);
      const bg=document.createElementNS(NS,'circle');bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',r);
      bg.setAttribute('fill','none');bg.setAttribute('stroke',acc+'50');bg.setAttribute('stroke-width','0.8');svg.appendChild(bg);
      c.setAttribute('fill',acc);c.setAttribute('opacity','0.55');c.setAttribute('clip-path',`url(#${cid})`);
    }else{c.setAttribute('fill','none');c.setAttribute('stroke','rgba(155,28,42,.32)');c.setAttribute('stroke-width','0.8');}
    svg.appendChild(c);}
  return svg;}

let tapResetTimer=null, tapResetProg=0;

    outer.appendChild(h('div',{sty:{padding:'8px 16px 6px',textAlign:'center',flexShrink:0,zIndex:4}},
      h('p',{sty:{fontFamily:'Lato',fontSize:'calc(10px * var(--scale))',color:`${ring}88`,letterSpacing:'.5px',lineHeight:'1.4'}},'Colour change confirms each tap — practise freely')
    ));

      h('div',{sty:{fontFamily:'Lato',fontWeight:300,fontSize:'calc(36px * var(--scale))',color:`${ring}dd`,lineHeight:1,textShadow:`0 2px 12px ${ring}44`}},fmt(tap.count))

  const ta=h('div',{sty:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',position:'relative',overflow:'hidden',zIndex:2}});
  function doTap(e){if(tapShown||tapReset)return;e.preventDefault();

    ));

    // ── Revealed total view — LOG TO PRACTICE at very top ──
    ta.appendChild(h('div',{sty:{textAlign:'center',animation:'fadeIn .4s ease-out',pointerEvents:'none',width:'100%',display:'flex',flexDirection:'column',alignItems:'center',padding:'0 20px'}},
      h('button',{sty:{background:'var(--gold-ghost)',border:'1px solid var(--bdr-hi)',borderRadius:'12px',padding:'13px 28px',color:'var(--gold)',fontFamily:'Playfair Display',fontSize:'calc(13px * var(--scale))',letterSpacing:'1px',cursor:'pointer',display:'inline-block',pointerEvents:'auto',marginBottom:'20px'},onClick:e=>{e.stopPropagation();set({modal:{type:'figlog',count:tap.count}});}}, 'LOG TO PRACTICE  ↗'),
      h('p',{sty:{fontFamily:'Playfair Display',color:'var(--tx-lo)',fontSize:'calc(11px * var(--scale))',letterSpacing:'3px',marginBottom:'10px'}},'SESSION TOTAL'),

      h('button',{sty:{display:'inline-block',background:'var(--inp)',border:'1px solid var(--bdr)',borderRadius:'12px',color:'var(--tx-lo)',fontSize:'calc(13px * var(--scale))',cursor:'pointer',fontFamily:'Lato',pointerEvents:'auto',padding:'12px 28px',marginTop:'4px'},onClick:e=>{e.stopPropagation();set({tapShown:false});}}, 'Continue tapping')
    ));

  bar.appendChild(h('button',{sty:{background:'var(--inp)',border:'1px solid var(--bdr)',borderRadius:'10px',minWidth:'52px',minHeight:'52px',color:'var(--tx-mid)',cursor:'pointer',fontSize:'18px'},onClick:()=>{const nt={...tap,count:Math.max(0,tap.count-1)};lsSet('esm_tap',nt);set({tap:nt});}},'−'));
  if(!tapShown&&!tapReset){
    // Middle: Reveal + Keep-total toggle
    const midBar=h('div',{sty:{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',flex:1}});
    midBar.appendChild(h('button',{sty:{background:`${ring}12`,border:`1px solid ${ring}30`,borderRadius:'10px',padding:'13px 20px',color:`${ring}cc`,fontFamily:'Playfair Display',fontSize:'calc(11px * var(--scale))',letterSpacing:'1.5px',cursor:'pointer'},onClick:()=>set({tapShown:true})},'REVEAL TOTAL'));
    midBar.appendChild(h('button',{sty:{background:tapPinned?`${ring}22`:'none',border:`1px solid ${tapPinned?ring+'60':'transparent'}`,borderRadius:'8px',padding:'3px 10px',color:tapPinned?`${ring}ee`:`${ring}55`,fontFamily:'Lato',fontSize:'calc(9px * var(--scale))',letterSpacing:'.5px',cursor:'pointer'},onClick:()=>{const v=!ST.tapPinned;lsSet('esm_tap_pinned',v);set({tapPinned:v});}},tapPinned?'⊙ Total pinned':'○ Keep total on screen'));

  function startR(){
    if(tapResetTimer)return;            // already holding
    tapResetProg=0;
    set({tapReset:true,tapProg:0});     // render the reset overlay once
    tapResetTimer=setInterval(()=>{
      const bar=document.getElementById('tap-reset-bar');
      // Overlay gone (released, or tab switched mid-hold) — stop and bail.
      if(!bar){clearInterval(tapResetTimer);tapResetTimer=null;return;}

    tapResetProg=0;
    if(ST.tapReset)set({tapReset:false,tapProg:0});
  }
  rb.addEventListener('mousedown',startR);rb.addEventListener('touchstart',e=>{e.preventDefault();startR();},{passive:false});
  rb.addEventListener('mouseup',stopR);rb.addEventListener('mouseleave',stopR);rb.addEventListener('touchend',stopR);

const ZONE_COLORS={
  karmapas:'#c09010',lineage:'#b07820',mahasiddhas:'#7040b0',
  teachers:'#1870a8',buddhas:'#3060c0',bodhisattvas:'#1888b8',
  yidams:'#8b1c2a',dakinis:'#b83068',protectors:'#504070','female-masters':'#8840a8',

function getZoneColor(tags){
  const order=['karmapas','yidams','dakinis','mahasiddhas','lineage','teachers','buddhas','bodhisattvas','protectors','female-masters','offerings'];
  for(const z of order){if((tags||[]).includes(z))return ZONE_COLORS[z];}
  return '#706050';
}

function applyRfFilter(val){
  rfFilter=val;
  const f=val.trim().toLowerCase();
  const searchActive=!!f;
  // When searching, force markers visible; when cleared, revert to toggle state
  document.querySelectorAll('.rf-marker').forEach(el=>{
    const fig=FIGS.find(fg=>fg.id===el.dataset.figid);
    if(!fig)return;
    const match=!f||fig.name.toLowerCase().includes(f)||(fig.sub||'').toLowerCase().includes(f)||(fig.tags||[]).some(t=>t.includes(f));
    // Visibility: show if toggle is on OR search is active
    const visible=rfMarkersVisible||searchActive;
    el.classList.toggle('hidden-marker',!visible);
    el.classList.toggle('dim',searchActive&&!match);
    el.classList.toggle('highlighted',searchActive&&match);
  });
  // Update legend items
  document.querySelectorAll('.rf-legend-item').forEach(el=>{
    const fig=FIGS.find(fg=>fg.id===el.dataset.figid);
    if(!fig)return;
    const match=!f||fig.name.toLowerCase().includes(f)||(fig.sub||'').toLowerCase().includes(f)||(fig.tags||[]).some(t=>t.includes(f));
    el.classList.toggle('dim',!!f&&!match);
  });}

function setRfTag(tag){
  const inp=document.getElementById('rf-search-input');
  const val=tag==='all'?'':tag;
  if(inp){inp.value=val;}
  applyRfFilter(val);
  // Update tag button active states
  document.querySelectorAll('.rf-tag-btn').forEach(b=>{
    b.classList.toggle('on',b.dataset.tag===tag||(tag==='all'&&b.dataset.tag==='all'));});}

// Generated figure-map schematic (replaces the old refuge-map.jpg). Each figure
// is a tombstone outline + zone-coloured number badge + name, positioned from the
// same FIGS data as the markers, so the numbering can never drift. Tap → drawer.
function renderRefMap(){
  const W=1080,H=1400,esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f3ecdc;border-radius:6px">`;
  FIGS.forEach(f=>{
    const cx=f.x/100*W, cy=f.y/100*H, w=66, ht=44, r=8, x=cx-w/2, y=cy-ht/2, col=getZoneColor(f.tags);
    const path=`M${x} ${y+r} Q${x} ${y} ${x+r} ${y} H${x+w-r} Q${x+w} ${y} ${x+w} ${y+r} V${y+ht} H${x} Z`;
    svg+=`<g data-figid="${f.id}" style="cursor:pointer">`
      +`<path d="${path}" fill="#fffdf7" stroke="${col}" stroke-width="1.5"/>`
      +`<circle cx="${cx}" cy="${y}" r="11" fill="${col}"/>`
      +`<text x="${cx}" y="${y+4.5}" text-anchor="middle" font-family="Lato,sans-serif" font-size="13" font-weight="700" fill="#fff">${f.n}</text>`
      +`<text x="${cx}" y="${cy+9}" text-anchor="middle" font-family="Lato,sans-serif" font-size="9.5" fill="#2a1c10">${esc(f.name)}</text>`
      +`</g>`;
  });
  svg+=`</svg>`;
  const wrap=h('div',{sty:{width:'100%',marginBottom:'40px'}});
  wrap.innerHTML=svg;
  wrap.addEventListener('click',e=>{const g=e.target.closest('[data-figid]');if(g)openDrawer(g.dataset.figid);});
  return wrap;
}

function renderRefuge(container){
  const outer=h('div',{sty:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg)'}});

    // h('button',{title:'Edit marker positions',sty:{background:'var(--inp)',border:'1px solid var(--bdr)',borderRadius:'10px',padding:'7px 10px',cursor:'pointer',color:'var(--tx-lo)',fontSize:'13px',lineHeight:1},

    toggleBtn);

  // Search bar

  sinp.value=rfFilter;
  sinp.addEventListener('input',e=>applyRfFilter(e.target.value));
  sw.appendChild(sinp);outer.appendChild(sw);

  // Category chips (new categories)
  const cats=['all','karmapas','lineage','mahasiddhas','teachers','yidams','dakinis','buddhas','bodhisattvas','protectors','female-masters','offerings'];
  const tr=h('div',{sty:{padding:'6px 14px 8px',borderBottom:'1px solid var(--bdr)',display:'flex',flexWrap:'wrap',gap:'5px',flexShrink:0}});
  cats.forEach(t=>{
    const isActive=(rfFilter===t)||(t==='all'&&!rfFilter);
    const col=ZONE_COLORS[t];
    const btn=h('button',{
      cls:'rf-tag-btn a11y-b'+(isActive?' on':''),
      'data-tag':t,
      sty:{fontSize:'calc(10px * var(--scale))',borderLeftColor:col&&isActive?col:'transparent',borderLeftWidth:'3px',borderLeftStyle:'solid'},
      onClick:()=>setRfTag(t)
    },t==='all'?'All':t);
    tr.appendChild(btn);});
  outer.appendChild(tr);

  // Scrollable main body
  const scroll=h('div',{sty:{flex:1,overflowY:'auto'}});

  // Thangka image with zone-coloured markers
  // aspect-ratio locks the coordinate space to the image's true proportions (1080×1359)
  // so that left/top % on .rf-marker always map correctly regardless of viewport width
  const imgWrap=h('div',{sty:{position:'relative',display:'block',width:'100%',aspectRatio:'1080/1359',overflow:'hidden',touchAction:'pan-y'}});
  // Inner stage holds the image + markers and is what zoom/pan transforms.
  const stage=h('div',{sty:{position:'absolute',inset:0,transformOrigin:'0 0',willChange:'transform'}});
  const img=h('img',{src:'refuge-tree.jpg',sty:{position:'absolute',inset:0,width:'100%',height:'100%',display:'block',objectFit:'fill'}});
  img.addEventListener('error',()=>{
    img.style.display='none';
    stage.appendChild(h('div',{sty:{padding:'48px 20px',textAlign:'center',background:'linear-gradient(180deg,#0d1e35,#0a2818 40%,#1a0c08)'}},
      h('div',{sty:{fontSize:'38px',marginBottom:'12px',opacity:.5}},'✾'),
      h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(13px * var(--scale))',color:'var(--gold-lo)',marginBottom:'8px'}},'REFUGE FIELD'),
      h('p',{sty:{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:'calc(14px * var(--scale))',color:'var(--tx-lo)',lineHeight:'1.7'}},'Place refuge-tree.jpg alongside this file to display the thangka.')
    ));});
  stage.appendChild(img);

  // Zone-coloured markers
  FIGS.forEach(fig=>{
    const zColor=getZoneColor(fig.tags);
    const marker=h('div',{
      cls:'rf-marker'+((rfMarkersVisible||rfEditMode)?' ':' hidden-marker'),
      'data-figid':fig.id,
      sty:{left:`${fig.x}%`,top:`${fig.y}%`,background:zColor,
        // In edit mode markers must not swallow the tap — the image handles placement.
        pointerEvents:rfEditMode?'none':'auto'},
      title:`${fig.n}. ${fig.name}`,
      onClick:()=>{if(!rfEditMode)openDrawer(fig.id);}
    },String(fig.n));
    stage.appendChild(marker);
  });
  imgWrap.appendChild(stage);

  // ── PINCH / DOUBLE-TAP ZOOM + DRAG-PAN (view mode only) ──────
  // Transforms `stage`; imgWrap stays the clipping viewport. Disabled while
  // editing so placement coordinates stay in base (untransformed) space.
  if(!rfEditMode){
    let sc=1,tx=0,ty=0;
    const pts=new Map();            // active pointers
    let moved=0,panStart=null,pinch=null,lastTap=0;
    const apply=()=>{stage.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;
      // When zoomed, capture all touch so drags pan; at 1× let the page scroll.
      imgWrap.style.touchAction=sc>1?'none':'pan-y';};
    const clamp=()=>{const W=imgWrap.clientWidth,H=imgWrap.clientHeight;
      sc=Math.max(1,Math.min(5,sc));
      tx=Math.min(0,Math.max(W*(1-sc),tx));
      ty=Math.min(0,Math.max(H*(1-sc),ty));};
    const zoomAt=(px,py,ns)=>{ns=Math.max(1,Math.min(5,ns));
      tx=px-(px-tx)*(ns/sc); ty=py-(py-ty)*(ns/sc); sc=ns; clamp(); apply();};
    const rel=e=>{const r=imgWrap.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];};
    imgWrap.addEventListener('wheel',e=>{e.preventDefault();const[px,py]=rel(e);zoomAt(px,py,sc*(e.deltaY<0?1.15:0.87));},{passive:false});
    imgWrap.addEventListener('pointerdown',e=>{
      pts.set(e.pointerId,[e.clientX,e.clientY]);moved=0;
      // Capture only when interacting (zoomed pan, or second finger for pinch)
      // so a plain swipe at 1× still scrolls the page.
      if(sc>1||pts.size===2){try{imgWrap.setPointerCapture(e.pointerId);}catch{}}
      if(pts.size===1){const[px,py]=rel(e);panStart=[px,py,tx,ty];
        const now=Date.now();
        if(now-lastTap<300){zoomAt(px,py,sc>1.5?1:2.6);lastTap=0;}else lastTap=now;
      } else if(pts.size===2){const p=[...pts.values()];
        pinch={d:Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]),sc};}
    });
    imgWrap.addEventListener('pointermove',e=>{
      if(!pts.has(e.pointerId))return;
      pts.set(e.pointerId,[e.clientX,e.clientY]);
      if(pts.size>=2&&pinch){const p=[...pts.values()];
        const d=Math.hypot(p[0][0]-p[1][0],p[0][1]-p[1][1]);
        const r=imgWrap.getBoundingClientRect();
        const mx=(p[0][0]+p[1][0])/2-r.left,my=(p[0][1]+p[1][1])/2-r.top;
        zoomAt(mx,my,pinch.sc*(d/pinch.d));moved=99;
      } else if(pts.size===1&&panStart&&sc>1){
        const[px,py]=rel(e);moved+=Math.abs(px-panStart[0])+Math.abs(py-panStart[1]);
        tx=panStart[2]+(px-panStart[0]);ty=panStart[3]+(py-panStart[1]);clamp();apply();
      }
    });
    const up=e=>{pts.delete(e.pointerId);if(pts.size<2)pinch=null;if(pts.size===0)panStart=null;};
    imgWrap.addEventListener('pointerup',up);
    imgWrap.addEventListener('pointercancel',up);
    // Suppress marker taps that were actually drags.
    imgWrap.addEventListener('click',e=>{if(moved>8){e.stopPropagation();e.preventDefault();moved=0;}},true);
    // Zoom buttons (desktop discoverability)
    const zb=(lbl,fn)=>h('button',{sty:{width:'30px',height:'30px',borderRadius:'8px',border:'1px solid rgba(255,255,255,.25)',background:'rgba(0,0,0,.45)',color:'#fff',fontSize:'17px',lineHeight:1,cursor:'pointer',backdropFilter:'blur(4px)'},onClick:fn},lbl);
    imgWrap.appendChild(h('div',{sty:{position:'absolute',right:'8px',bottom:'8px',zIndex:20,display:'flex',flexDirection:'column',gap:'6px'}},
      zb('+',()=>{const W=imgWrap.clientWidth,H=imgWrap.clientHeight;zoomAt(W/2,H/2,sc*1.4);}),
      zb('−',()=>{const W=imgWrap.clientWidth,H=imgWrap.clientHeight;zoomAt(W/2,H/2,sc/1.4);}),
      zb('⤢',()=>{sc=1;tx=0;ty=0;apply();})
    ));
  }

  // Touch/press to temporarily reveal markers (disabled while placing).
  function showMarkersTemp(){
    if(!rfMarkersVisible&&!rfEditMode&&!rfFilter.trim()){
      document.querySelectorAll('.rf-marker').forEach(el=>el.classList.remove('hidden-marker'));
    }
  }
  function hideMarkersTemp(){
    if(!rfMarkersVisible&&!rfEditMode&&!rfFilter.trim()){
      document.querySelectorAll('.rf-marker').forEach(el=>el.classList.add('hidden-marker'));
    }
  }
  imgWrap.addEventListener('touchstart',showMarkersTemp,{passive:true});
  imgWrap.addEventListener('touchend',hideMarkersTemp,{passive:true});
  imgWrap.addEventListener('touchcancel',hideMarkersTemp,{passive:true});
  imgWrap.addEventListener('mousedown',showMarkersTemp);
  imgWrap.addEventListener('mouseup',hideMarkersTemp);
  imgWrap.addEventListener('mouseleave',hideMarkersTemp);

  // ── MARKER-PLACEMENT EDITOR ──────────────────────────────────
  // Tap the thangka to drop the selected figure's pin, then auto-advance.
  // "Copy" yields a JSON id→[x,y] map to paste back into FIGS.
  if(rfEditMode){
    imgWrap.style.cursor='crosshair';
    const edBar=h('p',{sty:{fontFamily:'Lato',fontSize:'calc(12px * var(--scale))',color:'var(--tx)',lineHeight:'1.5'}});
    const edOut=h('textarea',{readonly:'',sty:{width:'100%',height:'56px',marginTop:'8px',fontSize:'11px',fontFamily:'monospace',background:'var(--inp)',color:'var(--tx)',border:'1px solid var(--bdr)',borderRadius:'8px',padding:'8px'}});
    function syncEd(){
      const fig=FIGS[rfEditIdx];
      edBar.innerHTML=`Placing <b>#${fig.n} ${fig.name}</b> — tap the thangka &nbsp;<span style="color:var(--tx-lo)">(${rfEditIdx+1}/${FIGS.length}, now ${fig.x},${fig.y})</span>`;
      imgWrap.querySelectorAll('.rf-marker').forEach(m=>m.classList.toggle('highlighted',m.dataset.figid===fig.id));
    }
    function syncOut(){const map={};FIGS.forEach(f=>map[f.id]=[f.x,f.y]);edOut.value=JSON.stringify(map);}
    imgWrap.addEventListener('click',e=>{
      const rect=imgWrap.getBoundingClientRect();
      const x=Math.round(((e.clientX-rect.left)/rect.width)*1000)/10;
      const y=Math.round(((e.clientY-rect.top)/rect.height)*1000)/10;
      const fig=FIGS[rfEditIdx];fig.x=x;fig.y=y;
      const mk=imgWrap.querySelector(`.rf-marker[data-figid="${fig.id}"]`);
      if(mk){mk.style.left=x+'%';mk.style.top=y+'%';}
      if(rfEditIdx<FIGS.length-1)rfEditIdx++;
      syncEd();syncOut();
    });
    const panel=h('div',{sty:{position:'sticky',top:0,zIndex:30,background:'var(--card)',borderBottom:'2px solid var(--gold)',padding:'10px 14px'}},
      edBar,
      h('div',{sty:{display:'flex',gap:'6px',marginTop:'8px'}},
        h('button',{cls:'btn-o',sty:{padding:'8px'},onClick:()=>{if(rfEditIdx>0)rfEditIdx--;syncEd();}},'‹ Prev'),
        h('button',{cls:'btn-o',sty:{padding:'8px'},onClick:()=>{if(rfEditIdx<FIGS.length-1)rfEditIdx++;syncEd();}},'Next ›'),
        h('button',{cls:'btn-o',sty:{padding:'8px'},onClick:()=>{const t=FIGS[rfEditIdx];window.open(t.wiki||`https://duckduckgo.com/?q=${encodeURIComponent(t.name)}`,'_blank','noopener');}},'Who?'),
        h('button',{cls:'btn',sty:{padding:'8px'},onClick:()=>{syncOut();edOut.select();navigator.clipboard&&navigator.clipboard.writeText(edOut.value);}},'Copy'),
        h('button',{cls:'btn-o',sty:{padding:'8px'},onClick:()=>{rfEditMode=false;render();}},'Done')
      ),
      edOut
    );
    scroll.appendChild(panel);
    setTimeout(()=>{syncEd();syncOut();},0);
  }

  scroll.appendChild(imgWrap);

  // Zone colour legend key
  const zoneKeys=Object.entries(ZONE_COLORS).filter(([k])=>FIGS.some(f=>(f.tags||[]).includes(k)));
  const keyRow=h('div',{sty:{padding:'8px 14px',display:'flex',flexWrap:'wrap',gap:'6px',background:'var(--surf)',borderTop:'1px solid var(--bdr)',borderBottom:'1px solid var(--bdr)'}});
  zoneKeys.forEach(([zone,col])=>{
    keyRow.appendChild(h('div',{sty:{display:'flex',alignItems:'center',gap:'4px'}},
      h('div',{sty:{width:'10px',height:'10px',borderRadius:'50%',background:col,border:'1.5px solid rgba(255,255,255,.7)',flexShrink:0}}),
      h('span',{sty:{fontFamily:'Lato',fontSize:'calc(9px * var(--scale))',color:'var(--tx-lo)'}},zone)
    ));
  });
  scroll.appendChild(keyRow);

  // Figure Index — collapsible
  let figIndexOpen=false;
  const figIndexHdr=h('div',{
    sty:{padding:'12px 14px',borderTop:'1px solid var(--bdr)',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',background:'var(--surf)'},
    onClick:()=>{
      figIndexOpen=!figIndexOpen;
      figIndexBody.style.display=figIndexOpen?'block':'none';
      figIndexChevron.textContent=figIndexOpen?'▲':'▼';
    }
  },
    h('div',{},
      h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(10px * var(--scale))',letterSpacing:'2px',color:'var(--gold-lo)'}},'FIGURE INDEX'),
      h('p',{sty:{fontFamily:'Lato',fontSize:'calc(9px * var(--scale))',color:'var(--tx-ghost)',marginTop:'2px'}},`${FIGS.length} figures — tap to read biography`)
    ),
    h('span',{id:'rf-fig-chevron',sty:{color:'var(--tx-ghost)',fontSize:'12px',flexShrink:0}},'▼')
  );
  const figIndexChevron=figIndexHdr.querySelector('#rf-fig-chevron');
  scroll.appendChild(figIndexHdr);

  const figIndexBody=h('div',{sty:{display:'none',paddingBottom:'16px'}});
  FIGS.forEach(fig=>{
    const zColor=getZoneColor(fig.tags);
    const item=h('div',{cls:'rf-legend-item','data-figid':fig.id,onClick:()=>openDrawer(fig.id)},
      h('div',{cls:'rf-legend-num',sty:{background:zColor+'22',borderColor:zColor+'88',color:zColor}},String(fig.n)),
      h('div',{sty:{flex:1,minWidth:0}},
        h('p',{sty:{fontFamily:'Cormorant Garamond',fontSize:'calc(16px * var(--scale))',color:'var(--tx)',lineHeight:'1.2'}},' '+fig.name),
        h('p',{sty:{fontFamily:'Lato',fontSize:'calc(10px * var(--scale))',color:'var(--tx-lo)',marginTop:'2px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},fig.sub||'')
      ),
      h('span',{sty:{color:'var(--tx-ghost)',fontSize:'18px',flexShrink:0}},'›')
    );
    figIndexBody.appendChild(item);
  });
  scroll.appendChild(figIndexBody);

  // Figure map — generated from FIGS so numbers always match the markers above
  scroll.appendChild(h('div',{sty:{padding:'12px 14px 6px',borderTop:'1px solid var(--bdr)'}},
    h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(10px * var(--scale))',letterSpacing:'2px',color:'var(--gold-lo)',marginBottom:'4px'}},'FIGURE MAP — numbers match the markers above'),
    h('p',{sty:{fontFamily:'Lato',fontSize:'calc(9px * var(--scale))',color:'var(--tx-ghost)',marginBottom:'8px'}},'Tap any figure to read about it.')));
  scroll.appendChild(renderRefMap());

  outer.appendChild(scroll);
  container.appendChild(outer);
  if(rfFilter)setTimeout(()=>applyRfFilter(rfFilter),50);}

function renderAbout(){

  const subs=['Calendar','Events','Info'];
  const sb=h('div',{sty:{display:'flex',borderBottom:'1px solid var(--bdr)',flexShrink:0,background:'var(--surf)'}});
  subs.forEach(t=>{const on=ST.aboutSub===t;sb.appendChild(h('button',{sty:{flex:1,padding:'12px 4px',background:'none',border:'none',borderBottom:`2px solid ${on?'var(--gold)':'transparent'}`,color:on?'var(--gold)':'var(--tx-lo)',fontSize:'calc(12px * var(--scale))',fontFamily:'Lato',letterSpacing:'.5px',cursor:'pointer',marginBottom:'-1px'},onClick:()=>{ST.aboutSub=t;render();}},t));});

// SETTINGS PAGE
// ═══════════════════════════════════════════════════════════
function renderSettings(){
  const outer=h('div',{sty:{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--bg)'}});
  outer.appendChild(h('div',{sty:{padding:'14px 14px 10px',borderBottom:'1px solid var(--bdr)',flexShrink:0,background:'var(--surf)'}},
    h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(15px * var(--scale))',letterSpacing:'.5px',color:'var(--gold)'}},'Settings'),
    h('p',{sty:{fontSize:'calc(10px * var(--scale))',color:'var(--tx-lo)',fontFamily:'Lato',marginTop:'3px'}},'Appearance and display options')));
  const scroll=h('div',{sty:{flex:1,overflowY:'auto',padding:'16px 14px 60px'}});

  // ── THEME ──
  scroll.appendChild(h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(9px * var(--scale))',letterSpacing:'2.5px',color:'var(--gold-lo)',marginBottom:'12px'}},'THEME'));
  const curTheme=document.documentElement.getAttribute('data-theme')||'light';
  const THEMES=[
    {id:'light', name:'Light',  bg:'#fdf8f0',fg:'#1a0804',acc:'#7a4e00',desc:'Warm parchment'},
    {id:'dark',  name:'Dark',   bg:'#0e0804',fg:'#f0e4c8',acc:'#d4980a',desc:'Deep amber'},
    {id:'neuro', name:'Focus',  bg:'#08101c',fg:'#e0eaf8',acc:'#5898c8',desc:'Blue-steel'},
    {id:'temple',name:'Temple', bg:'#1a0608',fg:'#f5e8d0',acc:'#e09020',desc:'Saffron & burgundy'},
    {id:'night', name:'Night',  bg:'#080c1e',fg:'#f0e8ff',acc:'#c0a060',desc:'Candlelit indigo'},
    {id:'earth', name:'Earth',  bg:'#f5ede0',fg:'#2c1008',acc:'#a06820',desc:'Terracotta & ochre'},
    {id:'slate', name:'Slate',  bg:'#1c2330',fg:'#d8e8f8',acc:'#7090b0',desc:'Cool grey-blue'},
  ];
  const themeGrid=h('div',{sty:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'9px',marginBottom:'26px'}});
  THEMES.forEach(t=>{
    const on=curTheme===t.id;
    const btn=h('button',{
      sty:{
        background:t.bg,border:`2px solid ${on?t.acc:'rgba(128,100,60,.15)'}`,
        borderRadius:'13px',padding:'13px 12px',cursor:'pointer',
        display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'4px',
        boxShadow:on?`0 0 0 1px ${t.acc}, 0 2px 10px rgba(0,0,0,.2)`:'0 1px 4px rgba(0,0,0,.15)',
        transition:'all .2s',textAlign:'left'
      },
      onClick:()=>{setTheme(t.id);render();}
    });
    btn.appendChild(h('div',{sty:{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%'}},
      h('span',{sty:{fontFamily:'Lato',fontWeight:700,fontSize:'13px',color:t.fg}},t.name),
      on?h('span',{sty:{color:t.acc,fontSize:'13px',lineHeight:1}},'✓'):h('span',{})));
    btn.appendChild(h('span',{sty:{fontFamily:'Cormorant Garamond',fontStyle:'italic',fontSize:'12px',color:t.acc,opacity:.9}},t.desc));
    btn.appendChild(h('div',{sty:{display:'flex',gap:'4px',marginTop:'5px'}},
      h('div',{sty:{width:'13px',height:'13px',borderRadius:'50%',background:t.acc}}),
      h('div',{sty:{width:'13px',height:'13px',borderRadius:'50%',background:t.fg,opacity:'.4'}}),
      h('div',{sty:{width:'13px',height:'13px',borderRadius:'50%',background:t.bg,border:`1.5px solid ${t.fg}30`}})
    ));
    themeGrid.appendChild(btn);
  });
  scroll.appendChild(themeGrid);

  // ── TEXT SIZE ──
  scroll.appendChild(h('p',{sty:{fontFamily:'Playfair Display',fontSize:'calc(9px * var(--scale))',letterSpacing:'2.5px',color:'var(--gold-lo)',marginBottom:'12px'}},'TEXT SIZE'));
  const curScale=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--scale'))||1;
  const sizeRow=h('div',{sty:{display:'flex',gap:'9px',marginBottom:'24px'}});
  [[1,'A','Normal'],[1.18,'A+','Large'],[1.38,'A++','Larger']].forEach(([v,lbl,name])=>{
    const on=Math.abs(curScale-v)<0.05;
    sizeRow.appendChild(h('button',{
      sty:{
        flex:1,background:on?'var(--gold-ghost)':'var(--inp)',
        border:`1px solid ${on?'var(--bdr-hi)':'var(--bdr)'}`,
        borderRadius:'12px',padding:'14px 8px',cursor:'pointer',
        display:'flex',flexDirection:'column',alignItems:'center',gap:'5px',transition:'all .2s'
      },
      onClick:()=>{setSize(v);render();}
    },
      h('span',{sty:{fontFamily:'Playfair Display',fontSize:`${Math.round(14*v)}px`,color:on?'var(--gold)':'var(--tx)',fontWeight:on?700:400,lineHeight:1}},lbl),
      h('span',{sty:{fontFamily:'Lato',fontSize:'10px',color:'var(--tx-lo)'}},name)
    ));
  });
  scroll.appendChild(sizeRow);

  outer.appendChild(scroll);
  return outer;
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
render();

// Re-render on width change only (desktop resize / device rotation) so the nav
// switches between bar/sidebar and the grid recomputes its cell size. Vertical
// resizes from the mobile URL bar showing/hiding are ignored to avoid churn.
let lastW=window.innerWidth, rzT;
window.addEventListener('resize',()=>{
  clearTimeout(rzT);
  rzT=setTimeout(()=>{if(window.innerWidth!==lastW){lastW=window.innerWidth;render();}},150);
});

// ═══════════════════════════════════════════════════════════
// PWA — SERVICE WORKER REGISTRATION
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
